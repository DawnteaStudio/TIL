name: Update BOJ/PGM README

on:
  push:
    paths:
      - '백준/**'
      - '프로그래머스/**'
      - '.github/workflows/update_baekjoon.py'
  workflow_dispatch:
    inputs:
      problem_numbers:
        description: '추가할 문제 번호(공백 구분)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run organizer script
        env:
          INPUT_PROBLEM_NUMBERS: ${{ github.event.inputs.problem_numbers }}
        run: |
          python .github/workflows/update_baekjoon.py

      - name: Push commits
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git fetch origin main
          git pull --rebase origin main || true
          git push origin HEAD:main
